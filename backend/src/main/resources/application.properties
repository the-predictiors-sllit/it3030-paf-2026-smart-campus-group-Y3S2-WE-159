spring.application.name=backend
spring.devtools.restart.enabled=false

# Database Connection
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlserver://database:1433;databaseName=smart_campus_v1;encrypt=true;trustServerCertificate=true}
# spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlserver://database:1433;databaseName=master;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:SuperSecretPassw0rd!}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

# Hibernate Settings
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- Connection Pool Settings ---
# This gives the app 60 seconds to try and connect before it gives up and crashes
spring.datasource.hikari.initialization-fail-timeout=60000

spring.datasource.hikari.connection-timeout=30000

management.endpoints.web.cors.allowed-origins=http://localhost:3000
management.endpoints.web.cors.allowed-methods=GET,POST



# MinIO Configuration
minio.endpoint=http://minio:9000
minio.accessKey=admin
minio.secretKey=password123
minio.bucketName=incident-reports

# Increase file size limits (Important for images!)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB



spring.security.oauth2.resourceserver.jwt.issuer-uri=https://dev-4cikw3sue0vwsly0.us.auth0.com
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://dev-4cikw3sue0vwsly0.us.auth0.com/.well-known/jwks.json
auth0.audience=https://smartcampus.api

